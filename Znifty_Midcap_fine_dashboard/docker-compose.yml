version: '3.8'

services:
  nifty-midcap-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nifty-midcap-dashboard
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./logs.log:/app/logs.log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Use nginx as a reverse proxy for production
