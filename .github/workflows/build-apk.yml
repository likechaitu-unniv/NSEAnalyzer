name: Build Android APK

# Trigger on every push to main/master, or manually via the Actions UI
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:          # Allows manual trigger from the GitHub Actions tab

jobs:
  build-android-apk:
    name: Build APK with Buildozer
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      # ── 1. Checkout source ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 (required by Android build tools) ──────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Python 3.10 ──────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 4. System-level build dependencies ──────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git zip unzip curl wget \
            build-essential autoconf libtool libltdl-dev \
            python3-dev python3-pip \
            libffi-dev libssl-dev \
            zlib1g-dev libbz2-dev liblzma-dev \
            libreadline-dev libsqlite3-dev \
            libgdbm-dev libdb5.3-dev \
            libncurses5-dev libncursesw5-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev libavformat-dev libavcodec-dev \
            cmake ninja-build \
            ccache

      # ── 5. Install Buildozer + Cython ────────────────────────────────────────
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      # ── 6. Cache Buildozer global directory (.buildozer/android/platform) ──
      - name: Cache Buildozer SDK/NDK downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 7. Build the debug APK ───────────────────────────────────────────────
      - name: Build debug APK
        run: |
          buildozer android debug 2>&1 | tee build.log

      # ── 8. Upload APK as a downloadable artifact ─────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NSEAnalyzer-debug-apk
          path: bin/*.apk
          retention-days: 30

      # ── 9. Upload build log for debugging ────────────────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
